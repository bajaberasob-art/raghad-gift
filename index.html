<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى رغد 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; background-color: #0a0a0a; color: white;
            font-family: 'Tajawal', sans-serif; text-align: center;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; position: relative;
        }

        /* القلوب المتصاعدة */
        .heart {
            position: absolute; color: #ff6eb4; bottom: -50px;
            animation: float 6s infinite linear; opacity: 0;
        }
        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            20% { opacity: 0.8; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }

        .container { z-index: 10; width: 90%; max-width: 400px; }

        .text-box { font-size: 1.4rem; line-height: 1.6; margin-bottom: 30px; min-height: 100px; color: #ffb6c1; }
        
        .btn {
            background: linear-gradient(45deg, #ff6eb4, #ffb6c1); border: none;
            color: #2b0a18; padding: 15px 40px; border-radius: 50px;
            font-size: 1.2rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 110, 180, 0.4);
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <audio id="myMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div id="heartsContainer"></div>

    <div class="container">
        <div id="displayArea">
            <div class="text-box">رغد، شغلي الموسيقى واسمعي دقات قلبي 🎵</div>
            <button class="btn" onclick="startStory()">تشغيل الموسيقى 🎧</button>
        </div>
    </div>

    <script>
        // دالة القلوب
        function createHeart() {
            const container = document.getElementById('heartsContainer');
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '❤';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
            heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
            container.appendChild(heart);
            setTimeout(() => heart.remove(), 6000);
        }
        setInterval(createHeart, 500);

        const steps = [
            { text: "تدرين المسافات مهما بعدت؟ ✨", type: 'auto' },
            { text: "بتبقين أنتي عسولتي.. وأقرب شيء لقلبي 🥺", type: 'auto' },
            { text: "يا دنيتي كلها.. 💖", type: 'button', btnText: "نعم؟ 🥰" },
            { text: "أدري البعد يتعب، وأدري إنك محتاجة تكوني جنبي.. وأنا محتاجك أكثر مما تتخيلي.. بس أوعدك، هذي المسافات بتنطوي، وبيجي اليوم اللي أمسك يدك وما أتركها أبداً.. أنتي أملي، ومستقبلي، وكل شيء حلو بهالدنيا 🫂💖", type: 'button', btnText: "التالي 💌" },
            { text: "تحبيني كثر ما أحبك؟ ✨", type: 'button', btnText: "أكييييد 💖" },
            { text: "وأنا أحبك لآخر نفس فيني.. إلى الأبد يا رغد.. ♾️🫂💖", type: 'final' }
        ];

        let currentStep = 0;

        function startStory() {
            document.getElementById('myMusic').play();
            showStep();
        }

        function showStep() {
            const step = steps[currentStep];
            const area = document.getElementById('displayArea');
            
            let html = `<div class="text-box">${step.text}</div>`;
            
            if (step.type === 'button') {
                html += `<button class="btn" onclick="nextStep()">${step.btnText}</button>`;
            }
            
            area.innerHTML = html;

            if (step.type === 'auto') {
                setTimeout(nextStep, 4000);
            }
        }

        function nextStep() {
            currentStep++;
            if (currentStep < steps.length) {
                showStep();
            }
        }
    </script>
</body>
</html>
