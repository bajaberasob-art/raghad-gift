<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى رغد 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0a0a0a; /* خلفية داكنة */
            /* إذا أردت صورة خلفية، احذف علامتي /* من السطرين القادمين وضع رابط الصورة */
            /* background-image: url('رابط_الصورة_هنا'); */
            /* background-size: cover; background-position: center; */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* الفقاعات العائمة في الخلفية مثل الفيديو */
        .bubbles-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        .bubble {
            position: absolute;
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            bottom: -50px;
            animation: floatup 10s infinite linear;
        }
        @keyframes floatup {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-120vh) scale(1.2); opacity: 0; }
        }

        /* المحتوى الأساسي */
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .show { opacity: 1; }

        .avatar {
            width: 100px;
            height: 100px;
            background-color: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .text-box {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 30px;
            min-height: 50px;
        }

        .long-text {
            font-size: 0.95rem;
            text-align: center;
            line-height: 1.8;
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        /* تصميم الأزرار */
        .buttons-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        .btn:hover, .btn:active {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .hidden { display: none !important; }

    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div class="bubbles-container" id="bubbles"></div>

    <div class="content show" id="mainContent">
        <div id="avatarBox" class="avatar hidden">🐻</div>
        <div id="textBox" class="text-box">اضغطي على الزر لتشغيل الموسيقى 🎵</div>
        
        <div id="btnBox" class="buttons-container">
            <button class="btn" onclick="startApp()">تشغيل الموسيقى</button>
        </div>
    </div>

    <script>
        // إنشاء الفقاعات العائمة
        const bubblesContainer = document.getElementById('bubbles');
        for (let i = 0; i < 15; i++) {
            let bubble = document.createElement('div');
            bubble.classList.add('bubble');
            let size = Math.random() * 40 + 10;
            bubble.style.width = size + 'px';
            bubble.style.height = size + 'px';
            bubble.style.left = Math.random() * 100 + 'vw';
            bubble.style.animationDuration = (Math.random() * 5 + 5) + 's';
            bubble.style.animationDelay = Math.random() * 5 + 's';
            bubblesContainer.appendChild(bubble);
        }

        const contentDiv = document.getElementById('mainContent');
        const textBox = document.getElementById('textBox');
        const btnBox = document.getElementById('btnBox');
        const avatarBox = document.getElementById('avatarBox');
        const bgMusic = document.getElementById('bgMusic');

        // الخطوات والنصوص
        const steps = [
            { type: 'auto', text: "وينها دنيتي؟ 🤍", time: 2500, avatar: '🐻' },
            { type: 'auto', text: "هلووو عسولتي 🥺", time: 2500, avatar: '🐻' },
            { type: 'button', text: "عندي رسالة لك 💌", avatar: '🐻', btns: [{ text: "وش هي؟", next: 4 }] },
            { type: 'button', class: 'long-text', text: "يمكن زعلتك، ويمكن خفت أقول اللي بقلبي بدون ما أحسب حساب ضيقتك، بس اليوم ما أقدر أخبي أكثر.. أنتي مو شخص عادي بحياتي.. من يوم عرفتك وأنتي رجعتي لي حياتي والابتسامة ما فارقتني.. أحبك وبعوضك عن كل لحظة زعل 🤍", avatar: '🐻', btns: [{ text: "التالي", next: 5 }] },
            { type: 'button', text: "تحبيني؟ 🥺", avatar: '🐻', btns: [{ text: "أي 🤍", next: 6 }, { text: "لازم أي 🤎", next: 6 }] },
            { type: 'button', text: "وأنا أحبك أكثر ❤️", avatar: '🐻', btns: [{ text: "حبيبي 🥺", next: 7 }] },
            { type: 'button', text: "بس أنا أكثرررر 😍", avatar: '🐻', btns: [{ text: "أحبك 🤍", next: 8 }] },
            { type: 'auto', text: "أحببببببببك موتتتت 🥺", time: 2500, avatar: '🐻' },
            { type: 'button', text: "أحبج كد الكون 1000000% 💖", avatar: '🐻', btns: [] }
        ];

        let currentStep = 0;

        function startApp() {
            // تشغيل الموسيقى
            bgMusic.play().catch(e => console.log("المتصفح منع التشغيل التلقائي"));
            avatarBox.classList.remove('hidden');
            goToStep(1);
        }

        function fadeTransition(callback) {
            contentDiv.classList.remove('show');
            setTimeout(() => {
                callback();
                contentDiv.classList.add('show');
            }, 500); // سرعة الاختفاء والظهور
        }

        function goToStep(index) {
            if (index >= steps.length) return;
            currentStep = index;
            const step = steps[index];

            fadeTransition(() => {
                // تحديث الصورة الرمزية
                avatarBox.innerHTML = step.avatar || '🐻';
                
                // تحديث النص
                textBox.innerHTML = step.text;
                if (step.class) {
                    textBox.className = 'text-box ' + step.class;
                } else {
                    textBox.className = 'text-box';
                }

                // مسح الأزرار القديمة
                btnBox.innerHTML = '';

                if (step.type === 'auto') {
                    // الانتقال التلقائي
                    setTimeout(() => goToStep(index + 1), step.time);
                } else if (step.type === 'button') {
                    // إنشاء الأزرار
                    if (step.btns && step.btns.length > 0) {
                        step.btns.forEach(b => {
                            let btn = document.createElement('button');
                            btn.className = 'btn';
                            btn.innerText = b.text;
                            btn.onclick = () => goToStep(b.next - 1); // الاندكس يبدأ من 0
                            btnBox.appendChild(btn);
                        });
                    }
                }
            });
        }
    </script>
</body>
</html>
