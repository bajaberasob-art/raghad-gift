<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى رغد 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0a0a0a; /* خلفية داكنة */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* حاوية القلوب المتصاعدة */
        .hearts-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        .heart {
            position: absolute;
            color: #ff6eb4; /* لون القلوب */
            bottom: -50px;
            animation: floatup 8s infinite linear;
            opacity: 0.7;
        }
        @keyframes floatup {
            0% { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-120vh) scale(1.2) rotate(360deg); opacity: 0; }
        }

        /* المحتوى الأساسي */
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transition: opacity 0.8s ease-in-out; /* انتقال أنعم */
        }

        .show { opacity: 1; }

        .avatar {
            width: 100px;
            height: 100px;
            background-color: rgba(255,110,180, 0.1);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            margin-bottom: 25px;
            box-shadow: 0 0 25px rgba(255, 110, 180, 0.3);
            border: 2px solid rgba(255, 110, 180, 0.2);
        }

        .text-box {
            font-size: 1.3rem;
            line-height: 1.6;
            margin-bottom: 35px;
            min-height: 60px;
            color: #ffb6c1;
        }

        .long-text {
            font-size: 1rem;
            text-align: center;
            line-height: 1.8;
            background: rgba(0, 0, 0, 0.6);
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 25px;
            color: white;
            border: 1px solid rgba(255,110,180, 0.2);
        }

        /* تصميم الأزرار */
        .buttons-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            background: linear-gradient(45deg, #ff6eb4, #ffb6c1);
            border: none;
            color: #2b0a18;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 110, 180, 0.4);
            transition: all 0.3s ease;
        }

        .btn:hover, .btn:active {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 110, 180, 0.6);
        }

        /* زر البدء مختلف قليلاً */
        #startBtn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: none;
        }

        .hidden { display: none !important; }

    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3" type="audio/mpeg">
    </audio>

    <div class="hearts-container" id="hearts"></div>

    <div class="content show" id="mainContent">
        <div id="avatarBox" class="avatar hidden">🤍</div>
        <div id="textBox" class="text-box">رغد، شغلي الموسيقى واسمعي دقات قلبي 🎵</div>
        
        <div id="btnBox" class="buttons-container">
            <button class="btn" id="startBtn" onclick="startApp()">تشغيل الموسيقى 🎧</button>
        </div>
    </div>

    <script>
        // إنشاء القلوب المتصاعدة تلقائياً
        const heartsContainer = document.getElementById('hearts');
        function createHearts() {
            for (let i = 0; i < 20; i++) {
                let heart = document.createElement('div');
                heart.classList.add('heart');
                heart.innerHTML = "❤";
                let size = Math.random() * 30 + 10;
                heart.style.fontSize = size + 'px';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = (Math.random() * 4 + 4) + 's';
                heart.style.animationDelay = Math.random() * 5 + 's';
                heartsContainer.appendChild(heart);
            }
        }
        createHearts(); // إنشاء قلوب في البداية

        const contentDiv = document.getElementById('mainContent');
        const textBox = document.getElementById('textBox');
        const btnBox = document.getElementById('btnBox');
        const avatarBox = document.getElementById('avatarBox');
        const bgMusic = document.getElementById('bgMusic');

        // الخطوات والنصوص الجديدة الرومنسية أكثر
        const steps = [
            { type: 'auto', text: "تدرين المسافات مهما بعدت؟ ✨", time: 3000, avatar: '🤍' },
            { type: 'auto', text: "بتبقين أنتي عسولتي.. وأقرب شيء لقلبي 🥺", time: 3000, avatar: '🤍' },
            { type: 'button', text: "يا دنيتي كلها.."، avatar: '🤍', btns: [{ text: "نعم؟ 💖", next: 4 }] },
            { type: 'button', class: 'long-text', text: "أدري البعد يتعب، وأدري إنك محتاجة تكوني جنبي.. وأنا محتاجك أكثر مما تتخيلي.. بس أوعدك، هذي المسافات بتنطوي، وبيجي اليوم اللي أمسك يدك وما أتركها أبداً.. أنتي أملي، ومستقبلي، وكل شيء حلو بهالدنيا 💖", avatar: '🐻', btns: [{ text: "التالي 🥰", next: 5 }] },
            { type: 'auto', text: "تخيلت يومنا؟ 🤔", time: 2500, avatar: '🤍' },
            { type: 'button', text: "أنتي لابسة فستانك الأبيض.. وأنا أسعد إنسان بالكون 😍", avatar: '🐼', btns: [{ text: "ان شاء الله 🤍", next: 6 }] },
            { type: 'button', text: "تحبيني كثر ما أحبك؟ ✨", avatar: '🤍', btns: [{ text: "أي / أكيد", next: 7 }] },
            { type: 'auto', text: "أنا أحبك لآخر نفس 🥺", time: 3000, avatar: '🤍' },
            { type: 'button', text: "إلى الأبد.. 🫂💖", avatar: '🤍', btns: [] }
        ];

        let currentStep = 0;

        function startApp() {
            // تشغيل الموسيقى
            bgMusic.play().catch(e => console.log("المتصفح منع التشغيل التلقائي"));
            avatarBox.classList.remove('hidden');
            goToStep(1);
        }

        function fadeTransition(callback) {
            contentDiv.classList.remove('show');
            setTimeout(() => {
                callback();
                contentDiv.classList.add('show');
            }, 800); // سرعة الانتقال بين النصوص
        }

        function goToStep(index) {
            if (index >= steps.length) return;
            currentStep = index;
            const step = steps[index];

            fadeTransition(() => {
                avatarBox.innerHTML = step.avatar || '🤍';
                textBox.innerHTML = step.text;
                if (step.class) {
                    textBox.className = 'text-box ' + step.class;
                } else {
                    textBox.className = 'text-box';
                }
                btnBox.innerHTML = '';
                if (step.type === 'auto') {
                    setTimeout(() => goToStep(index + 1), step.time);
                } else if (step.type === 'button') {
                    if (step.btns && step.btns.length > 0) {
                        step.btns.forEach(b => {
                            let btn = document.createElement('button');
                            btn.className = 'btn';
                            btn.innerText = b.text;
                            btn.onclick = () => goToStep(b.next - 1); // الاندكس يبدأ من 0
                            btnBox.appendChild(btn);
                        });
                    }
                }
            });
        }
    </script>
</body>
</html>
